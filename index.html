<!--
  * 功能描述：電子聯絡簿寫入系統 - 完整旗艦版 (含草稿區完整按鈕)
  * 代碼產生日期與時間：2026-07-23 22:43
  * 說明：包含完整的暫存草稿讀取與清除按鈕、SHA-256 密碼雜湊、JSONP 防快取與 iframe 頂層跳脫。
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子聯絡簿寫入程式</title>
  
  <script>
    // 自動跳脫 GAS iframe 隔離，確保取得完整視窗與 Storage 存取權
    if (window.top !== window.self) {
      try {
        window.top.location.href = window.location.href;
      } catch (e) {
        console.warn("無法自動跳脫 iframe，將以當前視窗持續運作。");
      }
    }
  </script>

  <style>
    :root {
      --primary-green: #0f5132;
      --btn-green: #198754;
      --btn-green-hover: #146c43;
      --btn-dark: #212529;
      --btn-dark-hover: #1c1f23;
      --btn-danger: #dc3545;
      --btn-danger-hover: #bb2d3b;
      --btn-secondary: #6c757d;
      --btn-secondary-hover: #5c636a;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #212529;
      --border-color: #dee2e6;
      --draft-border: #dc3545;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    input[type="password"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background-color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #86b7fe;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.99); }
    .btn-submit { background-color: var(--btn-green); }
    .btn-submit:hover { background-color: var(--btn-green-hover); }
    .btn-preview { background-color: var(--btn-dark); }
    .btn-preview:hover { background-color: var(--btn-dark-hover); }

    .btn-sm {
      width: auto;
      padding: 8px 12px;
      font-size: 0.85rem;
      margin-bottom: 0;
    }
    .btn-danger { background-color: var(--btn-danger); }
    .btn-danger:hover { background-color: var(--btn-danger-hover); }
    .btn-secondary { background-color: var(--btn-secondary); }
    .btn-secondary:hover { background-color: var(--btn-secondary-hover); }

    .status-box {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
      line-height: 1.4;
    }
    .status-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .status-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }

    /* 離線草稿區塊 */
    .draft-section {
      margin-top: 28px;
      border: 2px dashed var(--draft-border);
      border-radius: var(--radius);
      padding: 18px;
      background-color: #fff8f8;
    }

    .draft-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .draft-title {
      font-weight: 700;
      color: #b02a37;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .draft-status { font-size: 0.825rem; color: #6c757d; }

    .draft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .draft-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    @media (max-width: 480px) {
      .draft-grid { grid-template-columns: 1fr; }
      .draft-actions { flex-direction: column; }
      .draft-actions .btn-sm { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📝 電子聯絡簿寫入程式</h2>
  
  <div class="form-group">
    <label for="pwd">🔑 請輸入密碼（驗證身份以讀寫）：</label>
    <input type="password" id="pwd" placeholder="請輸入授權密碼...">
  </div>

  <div class="form-group">
    <label for="targetDate">📅 選擇同步日期：</label>
    <select id="targetDate"></select>
  </div>

  <div class="form-group">
    <label for="subject">🧩 選擇科目：</label>
    <select id="subject" onchange="loadDraftForCurrentSubject()">
      <option value="國文">國文</option>
      <option value="英文">英文</option>
      <option value="數學">數學</option>
      <option value="理化">理化</option>
      <option value="地科">地科</option>
      <option value="社會">社會</option>
    </select>
  </div>

  <label class="checkbox-group">
    <input type="checkbox" id="hasScore">
    📊 此科目今日有成績（有勾選送出顯示「有」）
  </label>

  <button class="btn btn-submit" onclick="handleWrite()">
    💾 確認修改並覆蓋回簡報
  </button>

  <button class="btn btn-preview" onclick="handleRead()">
    🖼️ 預覽簡報投影片 / 讀取雲端資料
  </button>

  <div id="statusBox" class="status-box"></div>

  <!-- 本機離線草稿暫存區 (補回完整功能按鈕) -->
  <div class="draft-section">
    <div class="draft-header">
      <div class="draft-title">💾 本機離線草稿暫存區</div>
      <div class="draft-status" id="draftNotice">(目前此科目無草稿)</div>
    </div>
    
    <div class="draft-grid">
      <div class="form-group" style="margin-bottom:0;">
        <label for="draftExam">📌 暫存考試：</label>
        <textarea id="draftExam" rows="3" placeholder="斷線時可在此輸入考試草稿..." oninput="autoSaveDraft()"></textarea>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label for="draftHomework">✍️ 暫存作業：</label>
        <textarea id="draftHomework" rows="3" placeholder="斷線時可在此輸入作業草稿..." oninput="autoSaveDraft()"></textarea>
      </div>
    </div>

    <!-- 補回草稿控制按鈕 -->
    <div class="draft-actions">
      <button class="btn btn-sm btn-secondary" onclick="loadDraftForCurrentSubject()">
        🔄 重新讀取此科目草稿
      </button>
      <button class="btn btn-sm btn-danger" onclick="clearDraftForCurrentSubject()">
        🗑️ 清除此科目暫存草稿
      </button>
    </div>
  </div>
</div>

<script>
  // 請將此處替換為您正式發布的 GAS Web App URL
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

  async function hashPassword(plainText) {
    if (!plainText) return "";
    const encoder = new TextEncoder();
    const data = encoder.encode(plainText);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function sendJsonpRequest(action, dataParams = {}) {
    return new Promise((resolve, reject) => {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_DEPLOYMENT_ID")) {
        reject(new Error("尚未設定正確的 GAS_WEB_APP_URL 部署網址。"));
        return;
      }

      const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      const script = document.createElement('script');
      
      script.crossOrigin = "anonymous";

      const queryParams = new URLSearchParams({
        action: action,
        callback: callbackName,
        _ts: Date.now(),
        ...dataParams
      });

      const fullUrl = `${GAS_WEB_APP_URL}?${queryParams.toString()}`;

      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("連線逾時：請確認網路連線或 GAS 權限設定為「所有人」。"));
      }, 12000);

      function cleanup() {
        clearTimeout(timer);
        if (window[callbackName]) delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[callbackName] = (response) => {
        cleanup();
        if (response && response.status === "error") {
          reject(new Error(response.message || "後端處理發生錯誤"));
        } else {
          resolve(response);
        }
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("連線失敗：JSONP 載入失敗，請確認網路連線。"));
      };

      script.src = fullUrl;
      document.body.appendChild(script);
    });
  }

  function showStatus(msg, isError = false) {
    const box = document.getElementById("statusBox");
    box.style.display = "block";
    box.className = "status-box " + (isError ? "status-error" : "status-success");
    box.innerText = msg;
  }

  function initDatePicker() {
    const select = document.getElementById("targetDate");
    const today = new Date();
    select.innerHTML = "";

    for (let i = -2; i <= 5; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const dateStr = d.toISOString().split('T')[0];
      const option = document.createElement("option");
      option.value = dateStr;
      option.textContent = dateStr + (i === 0 ? " (今天)" : "");
      if (i === 0) option.selected = true;
      select.appendChild(option);
    }
  }

  function getDraftKey() {
    const subject = document.getElementById("subject").value;
    const date = document.getElementById("targetDate").value;
    return `contact_draft_${date}_${subject}`;
  }

  function autoSaveDraft() {
    const key = getDraftKey();
    const draftData = {
      exam: document.getElementById("draftExam").value,
      homework: document.getElementById("draftHomework").value,
      timestamp: new Date().toLocaleTimeString()
    };
    localStorage.setItem(key, JSON.stringify(draftData));
    updateDraftNotice(true, draftData.timestamp);
  }

  function loadDraftForCurrentSubject() {
    const key = getDraftKey();
    const saved = localStorage.getItem(key);
    if (saved) {
      const draftData = JSON.parse(saved);
      document.getElementById("draftExam").value = draftData.exam || "";
      document.getElementById("draftHomework").value = draftData.homework || "";
      updateDraftNotice(true, draftData.timestamp);
    } else {
      document.getElementById("draftExam").value = "";
      document.getElementById("draftHomework").value = "";
      updateDraftNotice(false);
    }
  }

  // 清除當前科目草稿按鈕邏輯
  function clearDraftForCurrentSubject() {
    const key = getDraftKey();
    if (confirm("確定要清除此科目的本機暫存草稿嗎？")) {
      localStorage.removeItem(key);
      document.getElementById("draftExam").value = "";
      document.getElementById("draftHomework").value = "";
      updateDraftNotice(false);
      showStatus("🧹 已成功清除該科目的本機草稿。");
    }
  }

  function updateDraftNotice(hasDraft, timeStr = "") {
    const notice = document.getElementById("draftNotice");
    if (hasDraft) {
      notice.innerText = `(已自動暫存於 ${timeStr})`;
      notice.style.color = "#198754";
    } else {
      notice.innerText = "(目前此科目無草稿)";
      notice.style.color = "#6c757d";
    }
  }

  async function handleWrite() {
    const rawPwd = document.getElementById("pwd").value.trim();
    const date = document.getElementById("targetDate").value;
    const subject = document.getElementById("subject").value;
    const hasScore = document.getElementById("hasScore").checked ? "有" : "無";
    const exam = document.getElementById("draftExam").value.trim();
    const homework = document.getElementById("draftHomework").value.trim();

    if (!rawPwd) return alert("請輸入驗證密碼！");

    showStatus("正在連線並覆蓋資料至雲端...", false);

    try {
      const hashedPwd = await hashPassword(rawPwd);
      const res = await sendJsonpRequest("write", {
        password: rawPwd,
        hashedPassword: hashedPwd,
        date: date,
        subject: subject,
        hasScore: hasScore,
        exam: exam,
        homework: homework
      });

      showStatus(`✅ 寫入成功！ (${new Date().toLocaleTimeString()})`);
    } catch (err) {
      showStatus(`❌ ${err.message}`, true);
    }
  }

  async function handleRead() {
    const rawPwd = document.getElementById("pwd").value.trim();
    const date = document.getElementById("targetDate").value;
    const subject = document.getElementById("subject").value;

    if (!rawPwd) return alert("請輸入驗證密碼！");

    showStatus("正在讀取雲端最新資料...", false);

    try {
      const hashedPwd = await hashPassword(rawPwd);
      const res = await sendJsonpRequest("read", {
        password: rawPwd,
        hashedPassword: hashedPwd,
        date: date,
        subject: subject
      });

      if (res && res.data) {
        if (res.data.exam !== undefined) document.getElementById("draftExam").value = res.data.exam;
        if (res.data.homework !== undefined) document.getElementById("draftHomework").value = res.data.homework;
        if (res.data.hasScore !== undefined) document.getElementById("hasScore").checked = (res.data.hasScore === "有");
        
        autoSaveDraft();
        showStatus("✅ 雲端資料讀取成功並已載入！");
      } else {
        showStatus("⚠️ 讀取完成，該日期與科目尚無紀錄。");
      }
    } catch (err) {
      showStatus(`❌ ${err.message}`, true);
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    initDatePicker();
    loadDraftForCurrentSubject();
    document.getElementById("targetDate").addEventListener("change", loadDraftForCurrentSubject);
  });
</script>

</body>
</html>
