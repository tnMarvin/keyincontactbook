<!--
  * 功能描述：電子聯絡簿寫入系統 - 簡化直覺版 (雲端資料直接載入正式區 + 智能附加)
  * 代碼產生日期與時間：2026-07-23 23:02
  * 說明：
  * 1. 流程簡化：取消獨立唯讀預覽區，讀取雲端資料時直接載入至正式輸入區。
  * 2. 智能附加 (Smart Merge)：若正式區已有輸入內容，讀取或複製暫存時採換行「附加」而非覆蓋。
  * 3. 完整月曆選擇與防衛架構：原生 HTML5 月曆切換、SHA-256 雜湊、JSONP 匿名防 302 重導向與 iframe 跳脫。
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子聯絡簿寫入程式</title>
  
  <script>
    // 自動跳脫 GAS iframe 隔離，確保取得完整視窗與 Storage 存取權
    if (window.top !== window.self) {
      try {
        window.top.location.href = window.location.href;
      } catch (e) {
        console.warn("無法自動跳脫 iframe，將以當前視窗持續運作。");
      }
    }
  </script>

  <style>
    :root {
      --primary-green: #0f5132;
      --btn-green: #198754;
      --btn-green-hover: #146c43;
      --btn-dark: #212529;
      --btn-dark-hover: #1c1f23;
      --btn-warning: #ffc107;
      --btn-warning-hover: #ffca2c;
      --btn-danger: #dc3545;
      --btn-danger-hover: #bb2d3b;
      --btn-secondary: #6c757d;
      --btn-secondary-hover: #5c636a;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #212529;
      --border-color: #dee2e6;
      --draft-border: #dc3545;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    input[type="password"],
    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background-color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #86b7fe;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .date-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-row input[type="date"] {
      flex: 1;
      cursor: pointer;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.99); }
    .btn-submit { background-color: var(--btn-green); }
    .btn-submit:hover { background-color: var(--btn-green-hover); }
    .btn-preview { background-color: var(--btn-dark); }
    .btn-preview:hover { background-color: var(--btn-dark-hover); }

    .btn-sm {
      width: auto;
      padding: 8px 12px;
      font-size: 0.85rem;
      margin-bottom: 0;
    }
    .btn-warning { background-color: var(--btn-warning); color: #000; }
    .btn-warning:hover { background-color: var(--btn-warning-hover); }
    .btn-danger { background-color: var(--btn-danger); }
    .btn-danger:hover { background-color: var(--btn-danger-hover); }
    .btn-secondary { background-color: var(--btn-secondary); }
    .btn-secondary:hover { background-color: var(--btn-secondary-hover); }

    .status-box {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
      line-height: 1.4;
    }
    .status-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .status-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }

    /* 離線草稿區區塊 */
    .draft-section {
      margin-top: 28px;
      border: 2px dashed var(--draft-border);
      border-radius: var(--radius);
      padding: 18px;
      background-color: #fff8f8;
    }

    .draft-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .draft-title {
      font-weight: 700;
      color: #b02a37;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .draft-status { font-size: 0.825rem; color: #6c757d; }

    .action-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    @media (max-width: 520px) {
      .grid-2col { grid-template-columns: 1fr; }
      .action-row { flex-direction: column; }
      .action-row .btn-sm { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📝 電子聯絡簿寫入程式</h2>
  
  <!-- 1. 驗證密碼 -->
  <div class="form-group">
    <label for="pwd">🔑 請輸入密碼（驗證身份以讀寫）：</label>
    <input type="password" id="pwd" placeholder="請輸入授權密碼...">
  </div>

  <!-- 2. 日期選擇 -->
  <div class="form-group">
    <label for="targetDate">📅 選擇同步日期：</label>
    <div class="date-row">
      <button class="btn btn-sm btn-secondary" onclick="shiftDate(-1)">◀ 前一天</button>
      <input type="date" id="targetDate" onchange="onDateOrSubjectChange()">
      <button class="btn btn-sm btn-secondary" onclick="shiftDate(1)">後一天 ▶</button>
    </div>
  </div>

  <!-- 3. 科目選擇 -->
  <div class="form-group">
    <label for="subject">🧩 選擇科目：</label>
    <select id="subject" onchange="onDateOrSubjectChange()">
      <option value="國文">國文</option>
      <option value="英文">英文</option>
      <option value="數學">數學</option>
      <option value="理化">理化</option>
      <option value="地科">地科</option>
      <option value="社會">社會</option>
    </select>
  </div>

  <!-- 4. 正式區：今日有成績勾選框 -->
  <label class="checkbox-group">
    <input type="checkbox" id="hasScore">
    📊 此科目今日有成績（正式區：有勾選送出顯示「有」）
  </label>

  <!-- 5. 正式輸入區：考試與作業 -->
  <div class="grid-2col form-group">
    <div>
      <label for="formalExam">📌 正式考試內容：</label>
      <textarea id="formalExam" rows="3" placeholder="要寫入簡報的考試內容..."></textarea>
    </div>
    <div>
      <label for="formalHomework">✍️ 正式作業內容：</label>
      <textarea id="formalHomework" rows="3" placeholder="要寫入簡報的作業內容..."></textarea>
    </div>
  </div>

  <!-- 6. 主要操作按鈕 -->
  <button class="btn btn-submit" onclick="handleWrite()">
    💾 確認修改並覆蓋回簡報
  </button>

  <button class="btn btn-preview" onclick="handleRead()">
    ☁️ 讀取雲端現有投影片內容至正式區
  </button>

  <div id="statusBox" class="status-box"></div>

  <!-- 7. 本機離線草稿暫存區 -->
  <div class="draft-section">
    <div class="draft-header">
      <div class="draft-title">💾 本機離線草稿暫存區</div>
      <div class="draft-status" id="draftNotice">(目前此科目無草稿)</div>
    </div>

    <!-- 暫存區：今日有成績勾選紀錄 -->
    <label class="checkbox-group" style="margin-top:0;">
      <input type="checkbox" id="draftHasScore" onchange="autoSaveDraft()">
      📊 此科目今日有成績（草稿暫存）
    </label>
    
    <div class="grid-2col">
      <div class="form-group" style="margin-bottom:0;">
        <label for="draftExam">📌 暫存考試：</label>
        <textarea id="draftExam" rows="3" placeholder="斷線時可在此輸入考試草稿..." oninput="autoSaveDraft()"></textarea>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label for="draftHomework">✍️ 暫存作業：</label>
        <textarea id="draftHomework" rows="3" placeholder="斷線時可在此輸入作業草稿..." oninput="autoSaveDraft()"></textarea>
      </div>
    </div>

    <!-- 草稿控制按鈕 -->
    <div class="action-row">
      <button class="btn btn-sm btn-warning" onclick="copyDraftToFormal()">
        ⚡ 一鍵複製暫存內容到正式區 (有內容則附加)
      </button>
      <button class="btn btn-sm btn-secondary" onclick="loadDraftForCurrentSubject()">
        🔄 讀取暫存
      </button>
      <button class="btn btn-sm btn-danger" onclick="clearDraftForCurrentSubject()">
        🗑️ 清除暫存
      </button>
    </div>
  </div>
</div>

<script>
  // 請替換為您正式發布的 GAS Web App URL
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

  async function hashPassword(plainText) {
    if (!plainText) return "";
    const encoder = new TextEncoder();
    const data = encoder.encode(plainText);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function sendJsonpRequest(action, dataParams = {}) {
    return new Promise((resolve, reject) => {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_DEPLOYMENT_ID")) {
        reject(new Error("尚未設定正確的 GAS_WEB_APP_URL 部署網址。"));
        return;
      }

      const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      const script = document.createElement('script');
      
      script.crossOrigin = "anonymous";

      const queryParams = new URLSearchParams({
        action: action,
        callback: callbackName,
        _ts: Date.now(),
        ...dataParams
      });

      const fullUrl = `${GAS_WEB_APP_URL}?${queryParams.toString()}`;

      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("連線逾時：請確認網路連線或 GAS 權限設定為「所有人」。"));
      }, 12000);

      function cleanup() {
        clearTimeout(timer);
        if (window[callbackName]) delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[callbackName] = (response) => {
        cleanup();
        if (response && response.status === "error") {
          reject(new Error(response.message || "後端處理發生錯誤"));
        } else {
          resolve(response);
        }
      };

      script.onerror = () => {
        cleanup();
        reject(new Error("連線失敗：JSONP 載入失敗，請確認網路連線。"));
      };

      script.src = fullUrl;
      document.body.appendChild(script);
    });
  }

  function showStatus(msg, isError = false) {
    const box = document.getElementById("statusBox");
    box.style.display = "block";
    box.className = "status-box " + (isError ? "status-error" : "status-success");
    box.innerText = msg;
  }

  function initDatePicker() {
    const dateInput = document.getElementById("targetDate");
    const todayStr = new Date().toISOString().split('T')[0];
    dateInput.value = todayStr;
  }

  function shiftDate(offset) {
    const dateInput = document.getElementById("targetDate");
    const currentDate = new Date(dateInput.value || new Date());
    currentDate.setDate(currentDate.getDate() + offset);
    dateInput.value = currentDate.toISOString().split('T')[0];
    onDateOrSubjectChange();
  }

  function getDraftKey() {
    const subject = document.getElementById("subject").value;
    const date = document.getElementById("targetDate").value;
    return `contact_draft_${date}_${subject}`;
  }

  function autoSaveDraft() {
    const key = getDraftKey();
    const draftData = {
      exam: document.getElementById("draftExam").value,
      homework: document.getElementById("draftHomework").value,
      hasScore: document.getElementById("draftHasScore").checked,
      timestamp: new Date().toLocaleTimeString()
    };
    localStorage.setItem(key, JSON.stringify(draftData));
    updateDraftNotice(true, draftData.timestamp);
  }

  function loadDraftForCurrentSubject() {
    const key = getDraftKey();
    const saved = localStorage.getItem(key);
    if (saved) {
      const draftData = JSON.parse(saved);
      document.getElementById("draftExam").value = draftData.exam || "";
      document.getElementById("draftHomework").value = draftData.homework || "";
      document.getElementById("draftHasScore").checked = !!draftData.hasScore;
      updateDraftNotice(true, draftData.timestamp);
    } else {
      document.getElementById("draftExam").value = "";
      document.getElementById("draftHomework").value = "";
      document.getElementById("draftHasScore").checked = false;
      updateDraftNotice(false);
    }
  }

  /**
   * 智能合併文字 (若已有內容則換行附加，避開完全重複)
   */
  function smartMergeText(existingVal, newVal) {
    existingVal = (existingVal || "").trim();
    newVal = (newVal || "").trim();
    if (!existingVal) return newVal;
    if (!newVal) return existingVal;
    if (existingVal.includes(newVal)) return existingVal;
    return `${existingVal}\n${newVal}`;
  }

  /**
   * ⚡ 一鍵複製暫存內容至正式區
   */
  function copyDraftToFormal() {
    const draftExam = document.getElementById("draftExam").value;
    const draftHomework = document.getElementById("draftHomework").value;
    const draftHasScore = document.getElementById("draftHasScore").checked;

    if (!draftExam && !draftHomework && !draftHasScore) {
      return alert("目前草稿區尚無內容可複製！");
    }

    const currentFormalExam = document.getElementById("formalExam").value;
    const currentFormalHomework = document.getElementById("formalHomework").value;

    document.getElementById("formalExam").value = smartMergeText(currentFormalExam, draftExam);
    document.getElementById("formalHomework").value = smartMergeText(currentFormalHomework, draftHomework);
    
    if (draftHasScore) {
      document.getElementById("hasScore").checked = true;
    }

    showStatus("⚡ 已完成草稿同步！(若正式區已有內容已自動換行附加)");
  }

  function clearDraftForCurrentSubject() {
    const key = getDraftKey();
    if (confirm("確定要清除此科目的本機暫存草稿嗎？")) {
      localStorage.removeItem(key);
      document.getElementById("draftExam").value = "";
      document.getElementById("draftHomework").value = "";
      document.getElementById("draftHasScore").checked = false;
      updateDraftNotice(false);
      showStatus("🧹 已成功清除該科目的本機草稿。");
    }
  }

  function updateDraftNotice(hasDraft, timeStr = "") {
    const notice = document.getElementById("draftNotice");
    if (hasDraft) {
      notice.innerText = `(已自動暫存於 ${timeStr})`;
      notice.style.color = "#198754";
    } else {
      notice.innerText = "(目前此科目無草稿)";
      notice.style.color = "#6c757d";
    }
  }

  function onDateOrSubjectChange() {
    loadDraftForCurrentSubject();
    // 切換日期科目時，清空正式區，準備呈現新選擇日期的資料
    document.getElementById("formalExam").value = "";
    document.getElementById("formalHomework").value = "";
    document.getElementById("hasScore").checked = false;
  }

  /**
   * 寫入 Handler
   */
  async function handleWrite() {
    const rawPwd = document.getElementById("pwd").value.trim();
    const date = document.getElementById("targetDate").value;
    const subject = document.getElementById("subject").value;
    const hasScore = document.getElementById("hasScore").checked ? "有" : "無";
    const formalExam = document.getElementById("formalExam").value.trim();
    const formalHomework = document.getElementById("formalHomework").value.trim();

    if (!rawPwd) return alert("請輸入驗證密碼！");

    showStatus("正在連線並覆蓋資料至雲端簡報...", false);

    try {
      const hashedPwd = await hashPassword(rawPwd);
      const res = await sendJsonpRequest("write", {
        password: rawPwd,
        hashedPassword: hashedPwd,
        date: date,
        subject: subject,
        hasScore: hasScore,
        exam: formalExam,
        homework: formalHomework
      });

      showStatus(`✅ 雲端簡報寫入成功！ (${new Date().toLocaleTimeString()})`);
    } catch (err) {
      showStatus(`❌ ${err.message}`, true);
    }
  }

  /**
   * 讀取 Handler：直接讀入雲端內容至正式區
   */
  async function handleRead() {
    const rawPwd = document.getElementById("pwd").value.trim();
    const date = document.getElementById("targetDate").value;
    const subject = document.getElementById("subject").value;

    if (!rawPwd) return alert("請輸入驗證密碼！");

    showStatus("正在讀取雲端最新簡報內容...", false);

    try {
      const hashedPwd = await hashPassword(rawPwd);
      const res = await sendJsonpRequest("read", {
        password: rawPwd,
        hashedPassword: hashedPwd,
        date: date,
        subject: subject
      });

      if (res && res.data) {
        const cloudExamVal = res.data.exam || "";
        const cloudHomeworkVal = res.data.homework || "";
        const isScore = (res.data.hasScore === "有");

        const currentFormalExam = document.getElementById("formalExam").value;
        const currentFormalHomework = document.getElementById("formalHomework").value;

        // 直接智能帶入正式區 (若正式區有自己先打的內容，自動換行附加)
        document.getElementById("formalExam").value = smartMergeText(currentFormalExam, cloudExamVal);
        document.getElementById("formalHomework").value = smartMergeText(currentFormalHomework, cloudHomeworkVal);
        if (isScore) {
          document.getElementById("hasScore").checked = true;
        }

        showStatus("✅ 已成功讀取雲端內容並載入至正式區！");
      } else {
        showStatus("⚠️ 雲端讀取完成，該日期與科目尚無紀錄。");
      }
    } catch (err) {
      showStatus(`❌ ${err.message}`, true);
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    initDatePicker();
    loadDraftForCurrentSubject();
  });
</script>

</body>
</html>
